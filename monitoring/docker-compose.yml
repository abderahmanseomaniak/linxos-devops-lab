version: '3.9'
services:
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
    - "9090:9090"
    volumes:
    - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
    - "3001-3000"
    volumes:
    - grafana-storage:/var/lib/grafana
    restart: unless-stopped
volumes:
  grafana-storage: